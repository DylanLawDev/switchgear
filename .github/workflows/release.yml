name: Release images
on:
  push:
    tags: ["v*.*.*"]
permissions:
  contents: write
  packages: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v4
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/switchgear
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
      - uses: docker/build-push-action@v6
        id: default
        with:
          context: .
          target: default
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - uses: docker/build-push-action@v6
        id: full
        with:
          context: .
          target: full
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/switchgear:${{ steps.meta.outputs.version }}-full
      - uses: docker/build-push-action@v6
        id: browser
        with:
          context: .
          target: browser
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/switchgear:${{ steps.meta.outputs.version }}-browser
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            Default image digest: `${{ steps.default.outputs.digest }}`
            Full image digest: `${{ steps.full.outputs.digest }}`
            Browser image digest: `${{ steps.browser.outputs.digest }}`
