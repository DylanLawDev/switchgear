name: CI
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with: { version: "0.8.0" }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: uv sync --frozen --group dev --all-extras
      - run: uv run ruff check src tests
      - run: uv run pytest
  dependency-combinations:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        extras: ["", "--extra browser", "--extra gcp", "--all-extras"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with: { version: "0.8.0" }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: uv sync --frozen --group dev ${{ matrix.extras }}
      - run: uv run pytest tests/test_minimal_imports.py
  frontend:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm, cache-dependency-path: frontend/package-lock.json }
      - run: npm ci
      - run: npm test -- --run
      - run: npm run build
  containers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with: { context: ., target: default, push: false, load: true, tags: switchgear:test }
      - uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: switchgear:test
          severity: HIGH,CRITICAL
          exit-code: "1"
      - uses: docker/build-push-action@v6
        with: { context: ., target: browser, push: false, tags: switchgear:test-browser }
      - uses: docker/build-push-action@v6
        with: { context: ., target: full, push: false, tags: switchgear:test-full }
  compose-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with: { version: "0.8.0" }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: uv sync --frozen
      - run: scripts/run_smoke_test.sh
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
